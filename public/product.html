<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand.css">
<link rel="stylesheet" href="site.css">
<link rel="stylesheet" href="product.css">
</head>

<body>

<a class="skip-link" href="#mainContent">Skip to content</a>
<header class="navbar">

    <button class="back-btn" type="button" onclick="history.back()" aria-label="Go back">&larr;</button>

    <a class="logo product-brand" href="index.html" aria-label="Store home">
        <img class="brand-logo" src="assets/logo/unspoken-store-logo.svg" alt="Store logo">
    </a>

    <div class="nav-right">
        <a class="product-cart-link" href="cart.html" aria-label="Open cart">
            <span aria-hidden="true">&#128722;</span>
            <span class="cart-count-badge hidden" data-cart-count>0</span>
        </a>
    </div>

</header>

<main class="product-main" id="mainContent">
<div class="product-page">

    <div class="product-images">

        <div class="thumbnail-list" id="thumbnailList"></div>

        <div class="main-image">
            <img id="mainImage" alt="Product image">
        </div>

    </div>

    <div class="product-info">

        <h1 id="productName"></h1>
        <div class="product-meta" id="productMeta"></div>

        <p class="price" id="productPrice"></p>
        <p class="tax">Price incl. of all taxes</p>

        <div class="sizes">
            <p id="sizeLabel">Select size</p>
            <div class="size-buttons" aria-labelledby="sizeLabel">
                <button>XS</button>
                <button>S</button>
                <button>M</button>
                <button>L</button>
                <button>XL</button>
            </div>
        </div>

        <div class="quantity">
            <label for="quantitySelect">Quantity</label>
            <select id="quantitySelect">
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
            </select>
        </div>

        <div class="purchase-actions">
            <button class="add-cart" id="addCartBtn" type="button">ADD TO CART</button>
            <button class="wishlist" id="buyNowBtn" type="button">BUY NOW</button>
        </div>

        <div class="delivery">
            <h3>Delivery Details</h3>
            <div class="delivery-box">
                <input id="deliveryPincode" placeholder="Enter pincode" inputmode="numeric" autocomplete="postal-code">
                <button type="button">CHECK</button>
            </div>
        </div>

        <div class="accordion">

            <div class="acc-item">
                <button class="acc-title" type="button" aria-expanded="true" aria-controls="detailsContent">Product Details</button>
                <div class="acc-content" id="detailsContent"></div>
            </div>

            <div class="acc-item">
                <button class="acc-title" type="button" aria-expanded="false" aria-controls="descContent">Description</button>
                <div class="acc-content" id="descContent"></div>
            </div>

            <div class="acc-item">
                <button class="acc-title" type="button" aria-expanded="false" aria-controls="artistContent">Artist</button>
                <div class="acc-content" id="artistContent"></div>
            </div>

        </div>

    </div>

</div>

<section class="related-section">
    <div class="related-header">
        <h2>Style Pairings</h2>
        <p>Handpicked recommendations based on this product</p>
    </div>

    <div class="related-sections" id="relatedSections"></div>
</section>

<section class="reviews-section">
    <h2>Customer Reviews</h2>

    <div class="review">
        <p class="stars">★★★★★</p>
        <p>Insane quality, premium finish, and a perfect fit.</p>
    </div>

    <div class="review">
        <p class="stars">★★★★☆</p>
        <p>Great material and quick delivery. Worth it.</p>
    </div>
</section>

</main>

<div class="product-toast" id="productToast" aria-live="polite" aria-atomic="true"></div>

<script src="cart-core.js"></script>
<script src="product.js"></script>
</body>
</html>
